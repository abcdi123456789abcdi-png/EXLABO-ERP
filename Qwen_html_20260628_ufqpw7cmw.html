<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>EXLABO ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link href="/css/exlabo-theme.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><img src="/images/exlabo-logo.svg" alt="EXLABO"/></div>
        <ul class="sidebar-nav">
            <li><a href="/Dashboard" class="active"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="/CustomerManagement"><i class="fas fa-users"></i> العملاء</a></li>
            <li><a href="/Inventory"><i class="fas fa-boxes-stacked"></i> المواد</a></li>
            <li><a href="/Issue/Create"><i class="fas fa-flask"></i> الصرف</a></li>
            <li><a href="/SmartOrder/Create"><i class="fas fa-robot"></i> Smart Order (AI)</a></li>
            <li><a href="/Stocktake/Create"><i class="fas fa-clipboard-check"></i> الجرد</a></li>
            <li><a href="/Export/MonthlyReport"><i class="fas fa-file-pdf"></i> التقارير</a></li>
            <li><a href="/Backup/Create"><i class="fas fa-database"></i> نسخ احتياطي</a></li>
        </ul>
        <div class="sidebar-footer">EXLABO ERP © 2026</div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Search..."/></div>
            <div class="top-actions">
                <div class="notification-icon"><i class="fas fa-bell"></i><span class="notification-badge">@ViewBag.AlertCount</span></div>
                <div class="user-profile"><div class="user-avatar">A</div><div><div style="font-weight:600">Admin</div><div style="font-size:0.75rem;color:#64748b">مدير النظام</div></div></div>
            </div>
        </div>
        @if(TempData["Success"] != null){<div class="alert alert-success"><i class="fas fa-check-circle"></i>@TempData["Success"]</div>}
        @RenderBody()
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    @RenderSection("Scripts", required: false)
</body>
</html>
